services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: igi_lr5
      POSTGRES_USER: igi_lr5
      POSTGRES_PASSWORD: igi_lr5
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build: .
    environment:
      DB_ENGINE: postgres
      POSTGRES_DB: igi_lr5
      POSTGRES_USER: igi_lr5
      POSTGRES_PASSWORD: igi_lr5
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      DJANGO_LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./media:/app/media
    depends_on:
      - db

volumes:
  pgdata:
