services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: igi_lr5
      POSTGRES_USER: igi_lr5
      POSTGRES_PASSWORD: igi_lr5
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build: 
      context: .
      dockerfile: Dockerfile
    environment:
      DEBUG: "0"
      ALLOWED_HOSTS: "*.up.railway.app,localhost,127.0.0.1,0.0.0.0,web"
      DB_ENGINE: postgres
      POSTGRES_DB: igi_lr5
      POSTGRES_USER: igi_lr5
      POSTGRES_PASSWORD: igi_lr5
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      DJANGO_LOG_LEVEL: INFO
    volumes:
      - .:/app
      - ./media:/app/media
    depends_on:
      - db

volumes:
  pgdata:
  media_data:
  static_data:
